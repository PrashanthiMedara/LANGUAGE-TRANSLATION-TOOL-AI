<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Language Translation Tool</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <section class="translator">
      <header class="app-header">
        <div>
          <p class="eyebrow">Fast text translation</p>
          <h1>Language Translation Tool</h1>
        </div>
        <button class="icon-button" id="swapButton" type="button" title="Swap languages" aria-label="Swap languages">
          &#8644;
        </button>
      </header>

      <div class="language-row">
        <label class="field">
          <span>Source Language</span>
          <select id="sourceLanguage">
            <option value="en">English</option>
            <option value="es">Spanish</option>
            <option value="fr">French</option>
            <option value="de">German</option>
            <option value="it">Italian</option>
            <option value="pt">Portuguese</option>
            <option value="ru">Russian</option>
            <option value="ja">Japanese</option>
            <option value="ko">Korean</option>
            <option value="zh">Chinese</option>
            <option value="ar">Arabic</option>
            <option value="hi">Hindi</option>
          </select>
        </label>

        <label class="field">
          <span>Target Language</span>
          <select id="targetLanguage">
            <option value="es">Spanish</option>
            <option value="en">English</option>
            <option value="fr">French</option>
            <option value="de">German</option>
            <option value="it">Italian</option>
            <option value="pt">Portuguese</option>
            <option value="ru">Russian</option>
            <option value="ja">Japanese</option>
            <option value="ko">Korean</option>
            <option value="zh">Chinese</option>
            <option value="ar">Arabic</option>
            <option value="hi">Hindi</option>
          </select>
        </label>
      </div>

      <div class="panels">
        <label class="text-panel">
          <span>Enter Text</span>
          <textarea id="inputText" placeholder="Type or paste text to translate..."></textarea>
        </label>

        <label class="text-panel output-panel">
          <span>Translated Output</span>
          <textarea id="outputText" placeholder="Your translation will appear here..." readonly></textarea>
        </label>
      </div>

      <p class="message" id="message" role="status" aria-live="polite"></p>

      <div class="actions">
        <button class="primary-button" id="translateButton" type="button">Translate</button>
        <button class="secondary-button" id="copyButton" type="button">Copy</button>
        <button class="secondary-button" id="speakButton" type="button">Speak</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
